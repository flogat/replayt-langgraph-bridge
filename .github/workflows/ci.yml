name: CI

on:
  push:
    branches:
      - master
      # Mission Control backlog workflows push mc/backlog-* before CI poll
      - "mc/**"
  pull_request:
    branches:
      - master
      - "mc/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Run tests
      run: |
        pytest

    - name: Run linting
      run: |
        ruff check src tests

  supply-chain:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    # pip-audit has no --severity-high; --ignore-vuln only for CVEs in docs/DEPENDENCY_AUDIT.md
    - name: Run supply-chain audit
      run: pip-audit --ignore-vuln CVE-2026-4539 --desc
